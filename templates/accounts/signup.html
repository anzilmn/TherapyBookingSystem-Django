{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-10 col-lg-8">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="row g-0">
                <div class="col-md-5 bg-primary text-white p-5 d-none d-md-flex flex-column justify-content-center text-center">
                    <i class="bi bi-shield-lock-fill display-1 mb-4"></i>
                    <h2 class="fw-bold">Start Your Journey</h2>
                    <p class="opacity-75">Join thousands of people who have found peace of mind through our verified therapy network.</p>
                </div>
                <div class="col-md-7 bg-white p-4 p-lg-5">
                    <h3 class="fw-bold mb-4">Create Account</h3>
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3 custom-form-group">
                            {{ form.as_p }}
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill py-3 fw-bold shadow-sm mt-3">
                            Sign Up Now
                        </button>
                    </form>
                    <div class="text-center mt-4">
                        <p class="text-muted small">Already have an account? <a href="{% url 'login' %}" class="text-primary fw-bold text-decoration-none">Login here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Makes Django's default form look like Bootstrap */
    .custom-form-group p { margin-bottom: 1.5rem; }
    .custom-form-group input {
        display: block;
        width: 100%;
        padding: 0.75rem 1rem;
        font-size: 1rem;
        border: 1px solid #dee2e6;
        border-radius: 10px;
        background-color: #f8f9fa;
    }
    .custom-form-group input:focus {
        background-color: #fff;
        border-color: #4e73df;
        outline: 0;
        box-shadow: 0 0 0 0.25rem rgba(78, 115, 223, 0.1);
    }
    .helptext { display: block; font-size: 0.75rem; color: #6c757d; margin-top: 5px; }
</style>
{% endblock %}
