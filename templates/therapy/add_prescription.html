{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="bg-primary p-4 text-white">
                    <h3 class="fw-bold mb-0"><i class="bi bi-file-earmark-medical me-2"></i>Medical Prescription</h3>
                    <p class="mb-0 opacity-75">
                        Patient: <strong>{{ session.patient.username }}</strong> | 
                        Dr. {{ session.therapist.username }}
                    </p>
                </div>
                <div class="card-body p-4 p-lg-5">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold text-primary small text-uppercase">Diagnosis / Clinical Summary</label>
                            <textarea name="diagnosis" class="form-control bg-light border-0" rows="3" placeholder="Describe the patient's condition..." required></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-primary small text-uppercase">Advice & Observations</label>
                            <textarea name="advice" class="form-control bg-light border-0" rows="4" placeholder="Exercises, lifestyle changes, or therapy notes..." required></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-primary small text-uppercase">Suggested Medicines (Optional)</label>
                            <textarea name="medicines" class="form-control bg-light border-0" rows="2" placeholder="e.g. Melatonin 5mg before bed..."></textarea>
                        </div>

                        <div class="alert alert-info border-0 small d-flex align-items-center">
                            <i class="bi bi-info-circle-fill fs-5 me-2"></i>
                            <span>Submitting this will mark the session as <strong>Completed</strong> and notify the patient.</span>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill shadow-sm fw-bold mt-3 transition-up">
                            Finish & Send Prescription
                        </button>
                        
                        <div class="text-center mt-3">
                            <a href="{% url 'therapist_dashboard' %}" class="text-muted small text-decoration-none">Cancel and go back</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .transition-up { transition: transform 0.2s; }
    .transition-up:hover { transform: translateY(-2px); }
    textarea:focus { background-color: #fff !important; border: 1px solid #0d6efd !important; box-shadow: none !important; }
</style>
{% endblock %}
